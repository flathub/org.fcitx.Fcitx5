app-id: org.fcitx.Fcitx5
base: io.qt.qtwebengine.BaseApp
base-version: '6.10'
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
add-extensions:
  org.fcitx.Fcitx5.Addon:
    version: stable
    directory: addons
    subdirectories: true
    no-autodownload: true
    add-ld-path: lib
    autodelete: true
separate-locales: false
build-options:
  no-debuginfo: true
  strip: true
command: fcitx5
finish-args:
  - --socket=session-bus
  - --socket=x11
  - --share=ipc
  - --socket=wayland
  - --socket=inherit-wayland-socket
  - --share=network
  - --filesystem=xdg-config/kxkbrc:rw
  - --filesystem=xdg-config/fontconfig:ro
  - --filesystem=xdg-config/fcitx:create
  - --filesystem=xdg-config/ibus:create
  - --filesystem=xdg-cache/ibus:create
  - --device=dri
modules:
  - modules/xcb-imdkit.yaml
  - modules/libuv.yaml
  - modules/nlohmann-json.yaml
  - modules/enchant.yaml
  - name: fcitx5
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DUSE_SYSTEMD=Off
      - -DUSE_FLATPAK_ICON=On
      - -DENABLE_TEST=Off
    sources:
      - type: git
        url: https://github.com/fcitx/fcitx5
        tag: 5.1.19
        commit: e4c11948599a53cf12ae6286a86d7e36a4229a16
      - type: file
        url: https://download.fcitx-im.org/data/en_dict-20121020.tar.gz
        sha256: c44a5d7847925eea9e4d2d04748d442cd28dd9299a0b572ef7d91eac4f5a6ceb
        dest: src/modules/spell
      - type: file
        path: fcitx5.sh
    post-install:
      - install -d /app/addons
      - mv /app/bin/fcitx5{,-bin}
      - install -m755 fcitx5.sh /app/bin/fcitx5
  - name: fcitx5-qt
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_QT4=Off
      - -DENABLE_QT5=Off
      - -DENABLE_QT6=On
      - -DCMAKE_INSTALL_QT6PLUGINDIR=/app/lib/plugins
    sources:
      - type: git
        url: https://github.com/fcitx/fcitx5-qt
        tag: 5.1.13
        commit: 51cc53b68c792a87bebee60e29e09593044b67ed
  - name: fcitx5-configtool
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: git
        url: https://github.com/fcitx/fcitx5-configtool
        tag: 5.1.13
        commit: ecdd4e9dbaa74dfadeb1bcc8719e6f39f343755e
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DUSE_QT6=On
      - -DENABLE_KCM=Off
  - name: fcitx5-all-icons
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/fcitx/fcitx5-anthy
        dest: fcitx5-anthy
        tag: 5.1.10
        commit: 056a2224f11f9f5fbd1080943a38199ad08d6542
      - type: git
        url: https://github.com/fcitx/fcitx5-bamboo
        dest: fcitx5-bamboo
        tag: 1.0.10
        commit: bd8631bd49c4279d8e69b5de9299ac687ce9b43b
      - type: git
        url: https://github.com/fcitx/fcitx5-chewing
        dest: fcitx5-chewing
        tag: 5.1.11
        commit: 37068c3a2442d7f107e2836fe62270d718a0a3f5
      - type: git
        url: https://github.com/fcitx/fcitx5-chinese-addons
        dest: fcitx5-chinese-addons
        tag: 5.1.12
        commit: af0b11f17bc81ea10f2559a402c76b11bf429255
      - type: git
        url: https://github.com/fcitx/fcitx5-hangul
        dest: fcitx5-hangul
        tag: 5.1.9
        commit: b10c457c58d80ecc4e870c02bc8287bbd1305e38
      - type: git
